<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <style>
    .bg   { fill: #f0f0f0; }
    .rack { fill: #1a1a1a; }
    .hole { fill: #ffffff; }
    @media (prefers-color-scheme: dark) {
      .bg   { fill: #1a1a1a; }
      .rack { fill: #ffffff; }
      .hole { fill: #1a1a1a; }
    }
  </style>
  <!-- Background -->
  <rect class="bg" width="48" height="48"/>
  <!-- Handle — longer -->
  <rect class="rack" x="21" y="33" width="6" height="14" rx="3"/>
  <!-- Neck -->
  <rect class="rack" x="21" y="30" width="6" height="5" rx="1"/>
  <!-- Racket head — oval -->
  <ellipse class="rack" cx="24" cy="18" rx="15" ry="17"/>
  <!-- Holes — 3 rows -->
  <circle class="hole" cx="16" cy="11" r="2.8"/>
  <circle class="hole" cx="24" cy="11" r="2.8"/>
  <circle class="hole" cx="32" cy="11" r="2.8"/>
  <circle class="hole" cx="16" cy="20" r="2.8"/>
  <circle class="hole" cx="24" cy="20" r="2.8"/>
  <circle class="hole" cx="32" cy="20" r="2.8"/>
  <circle class="hole" cx="20" cy="28" r="2.3"/>
  <circle class="hole" cx="28" cy="28" r="2.3"/>
</svg>
