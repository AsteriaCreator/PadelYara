# ─────────────────────────────────────────────────────────────────────────────
# PadelYara Social Post Generator — Configuration
# Change any value here to adjust the layout without touching Python code.
# All paths are relative to the repository root.
# All sizes are in pixels (at 1080 × 1350 resolution).
# ─────────────────────────────────────────────────────────────────────────────

# ── Input image ──────────────────────────────────────────────────────────────
input_image: brand/social/input/ChatGPT Image Jun 13, 2026, 06_23_37 no text PM.png

# ── Output ───────────────────────────────────────────────────────────────────
output_dir: brand/social/output

# ── Canvas ───────────────────────────────────────────────────────────────────
canvas_width: 1080
canvas_height: 1350


# ── Text block ───────────────────────────────────────────────────────────────
text:
  lines:
    - "Während du diesen Beitrag"
    - "liest, wurde irgendwo"
    - "ein Court storniert."
    - ""
    - {text: "Ich weiß welcher.", color: [212, 245, 60]}
    - ""

  font: brand/CinzelFont/static/Cinzel-Bold.ttf
  font_size: 44
  line_spacing: 14

  # Default line color — silver so only the green accent line pops.
  color: [200, 200, 210]

  # Top-left corner of the text block — upper-left sky zone.
  x: 50
  y: 185

  # Safe column width: cat starts around x:490 in this image.
  max_width: 440


# ── Semi-transparent overlay (disabled — the sky is already dark) ─────────────
text_overlay:
  enabled: false
  color: [0, 0, 0]
  opacity: 0
  x: 0
  y: 0
  width: 0
  height: 0


# ── Header bar (disabled — lockup sits directly on dark sky) ─────────────────
header_bar:
  enabled: false


# ── Standalone paw (disabled — paw is now part of the signature) ─────────────
paw:


# ── Inline signature: "— " + YARA wordmark + paw ─────────────────────────────
# All three elements are rendered on the same baseline.
signature:
  enabled: true
  x: 50        # left edge — matches text block x
  y: 620       # baseline; pushed down to give breathing room after text

  dash:
    text: ""                # no dash — signature starts directly with YARA

  name:
    text: "YARA"
    color: [200, 200, 210]  # silver
    gap_after: 28           # more breathing room before the paw

  paw:
    file: brand/social/input/paw.png
    width: 35               # 20 % smaller than before (was 44)
    rise: 10                # pixels to lift above the text baseline
    color: [255, 255, 255]
    opacity: 255


# ── Bottom wordmark (disabled — replaced by text footer) ─────────────────────
wordmark:


# ── Footer: brand name + URL in Cinzel text ───────────────────────────────────
footer:
  font: brand/CinzelFont/static/Cinzel-Bold.ttf
  x: 50
  lines:
    - text: "PADELYARA"
      font_size: 36
      color: [255, 255, 255]
      y: 1240
    - text: "padelyara.at"
      font_size: 22
      color: [200, 200, 210]
      y: 1286
