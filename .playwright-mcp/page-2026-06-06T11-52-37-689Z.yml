  - generic [ref=e74]:
    - heading "Spiele Tennis auf einer der schönsten Anlagen des Waldviertels" [level=1] [ref=e75]
    - paragraph [ref=e76]:
      - text: Die Tennisanlage besteht aus drei Sandfreiplätzen (Tennis Force II) mit automatischer Bewässerungsanlage, einem Clubhaus und Umkleidekabinen mit Duschen für Damen und Herren. Die neuen 3 Freiplätze müssen vor und nach dem Spiel unbedingt bewässert werden. (grünen Knopf drücken, Bewässerung stoppt nach 3 Minuten automatisch, bei Bedarf wiederholen).
      - text: Für ein optimales Spielvergnügen empfiehlt sich auch während des Spiels den Platz zu bewässern.
      - text: Für den Winter stehen zwei Einzelhallen mit sandähnlichen, Gelenk schonenden Teppichböden zur Verfügung.
      - text: Es erwartet Sie eine familiäre Atmosphäre mit viel Herz für Tennisspieler. Die Jugendförderung steht bei uns im Vordergrund.
      - text: Es finden Tenniskurse im Sommer und im Winter statt. Tennistrainer stehen zur Verfügung.
    - link "Zur Online Reservierung" [ref=e77] [cursor=pointer]:
      - /url: https://app.tennis04.com/de/waldenstein/buchungsplan
    - link "" [ref=e78] [cursor=pointer]:
      - /url: "#squash"
      - generic [ref=e79]: 
  - generic [ref=e83]:
    - heading "Spiele Squash im hohen Norden" [level=1] [ref=e84]
    - paragraph [ref=e85]:
      - text: Schnelligkeit, ein gutes Reaktionsvermögen, strategisches Denken, ausreichend Kraft und nicht zuletzt eine gute Technik – all das benötigt man beim Squash spielen.
      - text: Squash ist eines der wenigen Rückschlagspiele, bei denen du das Spielfeld mit deinen Kontrahenten teilen musst. Ziel des Spiels ist es, den Ball mit dem Racket so zu schlagen, dass der Gegner ihn nicht mehr erreicht, bevor er zum zweiten Mal den Boden berührt.
      - link "Squash on Wikipedia" [ref=e86] [cursor=pointer]:
        - /url: https://de.wikipedia.org/wiki/Squash
      - text: Bei dieser Hochgeschwindigkeits-Schlagsportart kann man sich so richtig abreagieren und verbrennt dabei noch jede Menge Kalorien. Squash, eines der schnellsten Ballspiele der Welt, fördert Kraft, Ausdauer, Gelenkigkeit, Koordination und Konzentration.
      - text: Squash macht Spaß- ist ein Spiel - leicht erlernbar und enorm vielseitig. Unserer Anlage besteht aus einer Squashbox, welche 2009 saniert wurde.
    - link "Zur Online Reservierung" [ref=e87] [cursor=pointer]:
      - /url: https://app.tennis04.com/de/waldenstein/buchungsplan
    - link "" [ref=e88] [cursor=pointer]:
      - /url: "#aktuell"
      - generic [ref=e89]: 
  - generic [ref=e93]:
    - heading "Spiele Padel in Waldenstein" [level=1] [ref=e94]
    - paragraph [ref=e95]:
      - text: Padel (oder Padel-Tennis) ist ein Rückschlagsport, der seinen Ursprung in Mexiko hat. Der Volkssport vieler spanischsprachiger Länder gilt im deutschsprachigen Raum zwar noch als junger Sport, findet jedoch auch hierzulande immer mehr begeisterte Fans, und das mit gutem Grund. Padel ist eine Mischung aus Tennis und Squash. Gespielt wird auf einem tennisähnlichen Platz, der durch ein Mittelnetz in zwei Spielhälften geteilt und auf allen Seiten von Glas- und Gitterwänden umgeben ist. Es wird mit Tennisbällen und Schläger mit einer elastischen Schlagfläche gespielt. Gezählt wird nach den Tennisregeln, wobei die Wände beim Spiel miteinbezogen werden.
      - link "Padel on Wikipedia" [ref=e96] [cursor=pointer]:
        - /url: https://de.wikipedia.org/wiki/Padel-Tennis
      - text: Gemeinsam mit der Gemeinde Waldenstein wurde der erste Padelcourt im Waldviertel gebaut. In unserem Buchungssystem kann der Court für alle, nach Registrierung, gebucht werden. Die Kosten für 30 Minuten belaufen sich auf 8€. Das Flutlicht für 30 Minuten kostet 1 €. Bei Fragen einfach melden!
    - link "Zur Online Reservierung" [ref=e97] [cursor=pointer]:
      - /url: https://app.tennis04.com/de/waldenstein/buchungsplan
    - link "" [ref=e98] [cursor=pointer]:
      - /url: "#gesundheit"
      - generic [ref=e99]: 
  - generic [ref=e103]:
    - heading "Vital und Gesund" [level=1] [ref=e104]
    - paragraph [ref=e105]:
      - text: Ein bemerkenswertes Ausflugsziel aus dem vielschichtigen Angebot im Waldviertel ist die Gradieranlage (Sole-Inhalationsanlage) in Waldenstein.
      - text: Die in der Gradieranlage über Tannenreisig herabtropfende Sole nimmt aromatische Harze und ätherische Öle in sich auf. Die von Zweig zu Zweig fallenden Salztropfen werden geteilt, zerstäubt und gelangen in feinsten Partikeln in die Atemluft.
      - text: Das Einatmen der salzhaltigen Luft wirkt nicht nur schleimlösend und reizmildernd, sondern nach medizinischen Erkenntnissen auch entzündungshemmend sowie vorbeugend und heilend bei chronischer Bronchitis und Nebenhöhlenentzündungen.
      - text: Ebenso kann ein außerordentlich wohltuender Einfluss auf das vegetative Nervensystem festgestellt werden.
      - text: Auch eine gewisse Vitalisierung bei Entzündungserscheinungen oder Erleichterungen bei Herz-, Kreislauf- und Gefäßerkrankungen werden diesem medizinischen Wunderwerk zugeschrieben.
      - text: Keine Eintrittsgebühr - kostenlose Benützung der Anlage!
      - text: Die Anlage ist witterungsbedingt von November bis Ende April geschlossen!
    - link "" [ref=e106] [cursor=pointer]:
      - /url: "#geschichte"
      - generic [ref=e107]: 
