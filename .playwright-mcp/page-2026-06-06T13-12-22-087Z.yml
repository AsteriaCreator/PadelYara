                - paragraph [ref=e129]: Der Seminar- und Eventbereich bietet Raum für Seminare, Workshops, Geburtstagsfeiern und besondere Formate wie Spieleabende, Comedy-Abende oder Pop-up-Quiz.
              - generic [ref=e132]:
                - heading [level=3] [ref=e134]: Sportangebote
                - paragraph [ref=e137]: Im Bewegungsraum bieten externe Trainer:innen eigenständig Sportkurse für Kinder, Jugendliche und Erwachsene an.
