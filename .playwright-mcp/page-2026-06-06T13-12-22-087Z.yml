        - heading "Die neue Heimat für Padel in Kärnten" [level=1] [ref=e88]
        - paragraph [ref=e90]:
          - generic [ref=e91]:
            - text: In der
            - strong [ref=e92]: Arena ONE
            - text: in Klagenfurt erwartet dich modernes Padel auf professionellen Courts, wetterunabhängig und zentral erreichbar. Turnierspieler und Einsteiger spielen hier auf höchstem Niveau.
