        - heading "Eine neue Dimension für Sport & Lifestyle" [level=2] [ref=e103]:
          - text: Eine neue Dimension
          - text: für Sport & Lifestyle
        - generic [ref=e104]:
          - paragraph [ref=e105]: Arena ONE schließt die Lücke im Kärntner Padelsport. Wir verwandeln den bekannten Standort der ehemaligen Jump World One in die modernste Padel Arena Österreichs.
          - paragraph [ref=e106]:
            - generic [ref=e107]:
              - strong [ref=e108]: "Unser Anspruch ist Professionalität auf jedem Level:"
              - text: Von der ersten Padel-Akademie des Landes in Kooperation mit verschiedenen Ausbildungsstätten bis hin zum modernen Panoramacourt für dein Feierabend-Match. Arena ONE ist eine offene Sportanlage für alle, die Wert auf Qualität, Community und Lifestyle legen.
        - text:   
