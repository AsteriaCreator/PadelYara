            - heading "Details" [level=3] [ref=e237]
            - generic [ref=e238]: "Zwei Umkleidekabinen befinden sich direkt im Eingangsbereich. Außerhalb des Badebetriebs am Baggersee steht die öffentliche WC-Anlage am Gelände zur Verfügung. Während des Badebetriebs können die Toiletten im Restaurant Deck47 (www.deck47.at) genutzt werden. ÖFFNUNGSZEITEN DER PADELBASE INNSBRUCK: JAN täglich 06.00 - 21.30 Uhr | FEB-APR täglich 06.00 - 20.00 Uhr | MÄR täglich 06.00 - 20.00 Uhr | MAI täglich 06.00 - 20.30 Uhr | JUN-SEP täglich 06.00 - 21.30 Uhr | OKT täglich 06.00 - 20.30 Uhr | NOV täglich 06.00 - 20.00 Uhr | DEZ täglich 06.00 - 21.30 Uhr |"
