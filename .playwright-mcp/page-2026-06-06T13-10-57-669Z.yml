            - heading "Leihschläger" [level=3] [ref=e256]
            - paragraph [ref=e257]: Bei Bedarf können Leihschläger direkt online im Zuge der Platzreservierung oder auch im Anschluss dazugebucht werden. Nach der Buchung erhältst du eine Reservierungsbestätigung per E-Mail. Darin findest du im Abschnitt „Reservierungs-Addons“ einen Link zur Leihschläger-Box. Etwa 60 Minuten vor Spielbeginn erscheint beim Klick auf diesen Link der Zugangscode für die Box. Bitte achte darauf, dass du bei eTennis eingeloggt bist – sonst wird der Code nicht angezeigt. Solltest du die E-Mail nicht finden, überprüfe deine Benachrichtigungseinstellungen auf eTennis sowie deinen Spam-Ordner. Die Leichschläger-Box befindet sich beim Container Eingang.
          - generic [ref=e258]:
            - img [ref=e262]
            - heading "Rückerstattung" [level=3] [ref=e268]
