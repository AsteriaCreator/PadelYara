    - generic [ref=e23]:
      - heading "Von den Bergen bis an den See" [level=2] [ref=e24]
      - generic [ref=e25]:
        - generic [ref=e26]:
          - paragraph [ref=e27]: Padel begeistert immer mehr Sportlerinnen und Sportler in Österreich – und Kärnten ist da keine Ausnahme! Mit insgesamt über 300 Anlagen im ganzen Land (Stand 2025) findet dieser dynamische und gesellige Sport auch hierzulande großen Anklang.
          - paragraph [ref=e28]: Kärnten bietet aktuell 5 hochwertige Padel-Standorte, die sowohl Anfänger als auch erfahrene Spieler herzlich willkommen heißen. Dazu zählen unter anderem das Padel Tennis Center Wörthersee der Sportunion Klagenfurt oder die Padelbase in Annenheim am Ossiacher See.
        - generic [ref=e29]:
          - paragraph [ref=e30]: Jeder Standort bietet eine einzigartige Kombination aus professionellen Spielmöglichkeiten und dem Charme der Region – sei es umgeben von alpiner Natur, direkt am See oder in zentraler Lage.
          - paragraph [ref=e31]: Padel in Kärnten bietet die perfekte Kombination aus Sport, Spaß und Gemeinschaft – ideal für spannende Matches mit Freunden oder die Teilnahme an Turnieren. Die Kärntner Padelplätze überzeugen mit vielfältigen Möglichkeiten und einzigartigen Standorten.
