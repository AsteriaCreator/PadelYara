        - generic [ref=e36]:
          - heading "Padel-Tennis-Plätze buchen" [level=1] [ref=e37]
          - paragraph [ref=e38]: "UnserePadel-Tennisanlage des 1. Padel Tennis Club Vorarlbergin Rankweil verfügt über zwei moderne Padel-Courts: einenbeleuchteten Innenplatz mit Heizungund einenbeleuchteten Außenplatz, die beide bei unterschiedlichen Wetter- und Jahreszeiten ideale Spielbedingungen bieten. DerIndoor-Courtermöglicht komfortables Spielen auch an kühleren Tagen, während derOutdoor-CourtFrischluft und Sonne für sportliche Matches bietet. Die Anlage ist für Spieler aller Niveaus ausgelegt und schafft eine sportliche Atmosphäre für spannende Spiele, Trainingseinheiten oder gesellige Runden mit Freundinnen.Eine Stornierung deiner Buchung ist bis 36 Stunden vor Beginn kostenlos möglich. Bei späterer Absage oder Nichterscheinen wird der volle Betrag verrechnet.Bei Buchungsproblemen können Sie auch gerne telefonisch oder per Whatsapp buchen unter +436649651770."
