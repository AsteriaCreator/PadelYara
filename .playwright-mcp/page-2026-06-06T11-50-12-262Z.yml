              - paragraph [ref=e112]: Erste Meisterschaftserfahrung der neu geformten U10 gleich mit Auswärtssieg gekrönt
              - paragraph [ref=e113]: "Ein gelungener Einstieg in die Meisterschaftssaison: Unsere junge Mannschaft konnte bei ihrem ersten Antreten auswärts in Aschbach gleich einen Sieg feiern!"
              - paragraph [ref=e114]: Im Einzel zeigte Bennet Bandion eine souveräne Leistung und ließ seinem Gegner kaum Chancen. Bruno Fasching musste sich in einer spannenden Partie nur knapp geschlagen geben. Die Entscheidung fiel schließlich im Doppel, wo Ferdinand Mayr und Niklas Holly mit einer starken Vorstellung in zwei Sätzen den Sieg für UTC Melk fixierten.
              - paragraph [ref=e115]: Besonders hervorzuheben ist neben der sportlichen Leistung das vorbildliche Verhalten unserer Spieler – sowohl am Platz als auch abseits davon. Ein Auftakt, der Lust auf mehr macht!
              - generic [ref=e116]:
                - generic [ref=e117]:
                  - img "User Image" [ref=e118]
                  - text: UTC Melk Administrator
                - text: ", 14. Mai 2026"
          - generic [ref=e119]:
            - link "Gelungener Auftakt für die U10 des UTC Melk" [ref=e121] [cursor=pointer]:
              - /url: /news-30818-Gelungener_Auftakt_fuer_die_U10_des_UTC_Melk
              - img "Gelungener Auftakt für die U10 des UTC Melk" [ref=e122]
            - generic [ref=e123]:
              - heading "Gelungener Auftakt für die U10 des UTC Melk" [level=2] [ref=e124]:
                - link "Gelungener Auftakt für die U10 des UTC Melk" [ref=e125] [cursor=pointer]:
                  - /url: /news-30818-Gelungener_Auftakt_fuer_die_U10_des_UTC_Melk
              - paragraph [ref=e126]: Mit einem spannenden 2:1-Auswärtssieg gegen St. Pantaleon ist die U10-Mannschaft des UTC Melk erfolgreich in die diesjährige Meisterschaft gestartet.
              - paragraph [ref=e127]
              - paragraph [ref=e128]: Für Melk standen Theresa Ugrinovich, Paula Dallinger und Clemens Kaufmann im Einsatz. Theresa Ugrinovich sorgte mit einem souveränen Einzelsieg für den ersten Punkt der Melker Mannschaft. Das zweite Einzel musste Paula Dallinger trotz großem Einsatz leider abgeben.
              - paragraph [ref=e129]
              - paragraph [ref=e130]: Somit fiel die Entscheidung im Doppel, das sich zu einem echten Krimi entwickelte. Paula Dallinger und Clemens Kaufmann bewiesen starke Nerven und gewannen beide Sätze jeweils im Tiebreak. Besonders spannend verlief der zweite Satz, dessen Tiebreak mit 19:17 an die Melker ging.
              - paragraph [ref=e131]
              - paragraph [ref=e132]: Mit diesem hart erkämpften Erfolg darf sich die U10 des UTC Melk über einen gelungenen Meisterschaftsauftakt und einen verdienten Auswärtssieg freuen. BRAVO!!!
              - generic [ref=e133]:
