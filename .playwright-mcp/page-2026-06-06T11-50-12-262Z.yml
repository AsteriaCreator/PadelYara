            - 'link "2. Spieltag: Toller Erfolg der Damen – einige Partien wetterbedingt abgesagt" [ref=e78] [cursor=pointer]':
              - /url: /news-31146-2__Spieltag__Toller_Erfolg_der_Damen_____einige_Partien_wetterbedingt_abgesagt
