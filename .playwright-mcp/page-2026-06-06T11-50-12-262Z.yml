              - paragraph [ref=e70]: Da kann man schon mal drauf anstoßen!!
              - paragraph [ref=e71]: Unsere Damen 2 feierten einen überzeugenden 7:0 Erfolg gegen die Gäste aus Ardagger und zeigten dabei starkes Tennis sowie großen Teamgeist. Mit einer hervorragenden Mannschaftsleistung ließen sie den Gegnerinnen keine Chance.
              - paragraph [ref=e72]: Herzlichen Glückwunsch an unsere Mädels zu dieser tollen Leistung!
