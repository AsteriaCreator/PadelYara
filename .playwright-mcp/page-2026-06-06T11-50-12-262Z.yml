              - paragraph [ref=e143]
              - paragraph [ref=e144]: Liebe Mitglieder,
              - paragraph [ref=e145]: es freut uns sehr, dass unsere Anlage wieder so intensiv genutzt wird.
              - paragraph [ref=e146]:
                - strong [ref=e147]: PLÄTZE SPRITZEN
              - paragraph [ref=e148]: Aufgrund der aktuell anhaltenden Trockenheit bitten wir euch, die Plätze ausnahmslos vor dem Spielen zu bewässern. Die Handhabung ist bei uns sehr einfach – es genügt, den entsprechenden Knopf zu drücken. In vielen anderen Vereinen ist die Bewässerung deutlich aufwendiger und muss noch händisch erfolgen. Der Aufwand ist gering, der Nutzen extrem groß. Die Plätze werden sonst kaputt.
              - paragraph [ref=e149]:
                - strong [ref=e150]: KABINEN NUTZEN
              - paragraph [ref=e151]: Bitte nutzt für das Umziehen sowie für die Ablage von Schuhen, Taschen und persönlichen Gegenständen ausschließlich die Kabinen. Während des Spielens gehören eure Sachen entweder in die Kabine oder mit auf den Platz. Die Loungemöbel sind nicht als Ablage gedacht, sondern stehen allen Mitgliedern für ein gemütliches Beisammensein zur Verfügung.
              - paragraph [ref=e152]:
                - strong [ref=e153]
              - paragraph [ref=e154]:
                - strong [ref=e155]: Wir danken euch herzlich für eure Unterstützung und euer Verständnis!
