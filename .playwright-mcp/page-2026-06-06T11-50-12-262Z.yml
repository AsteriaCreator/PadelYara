            - generic [ref=e80]:
              - 'heading "2. Spieltag: Toller Erfolg der Damen – einige Partien wetterbedingt abgesagt" [level=2] [ref=e81]':
                - 'link "2. Spieltag: Toller Erfolg der Damen – einige Partien wetterbedingt abgesagt" [ref=e82] [cursor=pointer]':
                  - /url: /news-31146-2__Spieltag__Toller_Erfolg_der_Damen_____einige_Partien_wetterbedingt_abgesagt
              - paragraph [ref=e83]: Das vergangene Wochenende brachte für die Mannschaften des UTC Melk Licht und Schatten. Mehrere Begegnungen – insbesondere die Samstagsspiele – mussten aufgrund der schlechten Wetterbedingungen abgesagt werden. Dennoch gab es auf den Plätzen einige starke Leistungen und spannende Begegnungen.
              - paragraph [ref=e84]:
                - text: Für das Highlight des Wochenendes sorgte unsere
                - strong [ref=e85]: 1er-Damenmannschaft
                - text: in der Kreisliga A. UTC Melk 1 setzte sich in einer spannenden Partie mit 4:3 gegen UTC Raika Haidershofen 1 durch. Mit großartigen Einzelleistungen legten Doris E., Nathalie, Tanja und Doris R. den Grundstein für den Sieg. Eva musste sich nach einem starken Drei-Satz-Fight nur knapp geschlagen geben.
              - paragraph [ref=e86]: "Besonders beeindruckend waren die Einzel unserer Topspielerinnen: Doris E. drehte ihre Partie nach einem 0:6 im ersten Satz noch sensationell, während Nathalie ihrer starken Gegnerin beim klaren 6:1, 6:1 nicht den Hauch einer Chance ließ."
              - paragraph [ref=e87]:
                - text: Weniger nach Wunsch verlief das Wochenende für die
                - strong [ref=e88]: Herrenmannschaften 1 und 2
                - text: . Gegen den TC Ulmerfeld/Hausmening musste sich
                - strong [ref=e89]: UTC Melk 1
                - text: zwar mit 2:7 geschlagen geben, dennoch konnten einige Matches sehr ausgeglichen gestaltet werden.
              - paragraph [ref=e90]:
                - text: Auch
                - strong [ref=e91]: UTC Melk 2
                - text: hatte in der Herren Kreisliga B2 gegen UTC VB Waidhofen/Ybbs 2 eine schwierige Aufgabe. Trotz engagierter Leistung ging die Begegnung mit 3:6 verloren.
              - paragraph [ref=e92]: Wir sind überzeugt, dass unsere sportlich Verantwortlichen Armin und Flo bereits die richtigen Schlüsse gezogen haben. Die nächsten Partien bieten die nächste Chance – und da wird es bestimmt klappen.
              - paragraph [ref=e93]:
                - strong [ref=e94]: Die Begegnungen der Herren 2 und 4 sowie der Damen 2 und 3 mussten wetterbedingt leider verschoben werden.
              - paragraph [ref=e95]:
                - text: "Auch der Nachwuchs war wieder erfolgreich im Einsatz: Die"
                - strong [ref=e96]: Burschen U13
                - text: von UTC Melk 1 feierten einen souveränen 3:0-Erfolg gegen TTSV Union Steinakirchen 1.
                - strong [ref=e97]: Jakob Kleinberger und Alexander Tiefenbacher
                - text: zeigten großartige Leistungen und gaben in ihren Matches keinen einzigen Satz ab.
              - paragraph [ref=e98]:
                - text: Ebenfalls extrem stark präsentierten sich
                - strong [ref=e99]: Ferdinand Mayr und Niklas Holly
                - text: in der U10. Beide spielten groß auf – mehr als vier Games waren den Gastgebern aus St. Valentin nicht vergönnt.
              - paragraph [ref=e100]:
                - text: Die
                - strong [ref=e101]: Herren 55+
                - text: "lieferten ebenfalls eine tapfere Vorstellung ab. Gegen die übermächtigen Gegner aus St. Valentin war diesmal jedoch nichts zu holen. Die Senioren aus dem Westen zeigten beeindruckende Qualität – frei nach Arnautovic: „Shampoo.“"
              - generic [ref=e102]:
                - generic [ref=e103]:
                  - img "User Image" [ref=e104]
                  - text: UTC Melk Administrator
                - text: ", 20. Mai 2026"
