              - paragraph [ref=e168]: Der UTC Melk nimmt Abschied von Kurt Langer, der unser Vereinsleben über viele Jahre hinweg maßgeblich bereichert hat.
              - paragraph [ref=e169]: "Kurt war ein leidenschaftlicher Sportler und Tennisspieler, der bis ins hohe Alter mit großer Freude am Platz stand. Ebenso wichtig wie der Sport war ihm die Geselligkeit: das Miteinander, die Gespräche und die gemeinsamen Stunden nach dem Spiel – oft bei einem „Bummerl“."
              - paragraph [ref=e170]: Seine positive Einstellung, seine Werte und seine Freude an der Gemeinschaft leben im Verein weiter und werden auch von seinem Sohn Horst und seinem Enkel Jakob in diesem Sinne getragen.
              - paragraph [ref=e171]: Wir werden Kurt ein ehrendes Andenken bewahren.
