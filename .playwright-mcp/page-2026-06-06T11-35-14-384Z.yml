          - generic [ref=e84]:
            - paragraph
            - paragraph [ref=e86]: Die Austrian Padel Union hat im Rahmen ihrer Generalversammlung 2026 einen weiteren Schritt in der Entwicklung von Padel in Österreich gesetzt. Neben einem umfassenden Rückblick auf ein äußerst erfolgreiches Jahr 2025 standen insbesondere richtungsweisende Beschlüsse im Mittelpunkt, die den Weg für die angestrebte Aufnahme als anerkannter Sportfachverband bei Sport Austria - Österreichische Bundes-Sportorganisation ebnen sollen.
