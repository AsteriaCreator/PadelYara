          - generic [ref=e98]:
            - paragraph
            - generic [ref=e99]:
              - paragraph [ref=e100]:
                - text: Die Position
                - strong [ref=e101]: Sportdirektor*in Padel
                - text: wird neu ausgeschrieben. Der bisherige Sportdirektor
                - strong [ref=e102]: David Alten
                - text: wird seine Funktion
                - strong [ref=e103]: mit Ende Mai
                - text: auf eigenen Wunsch beenden.
              - paragraph [ref=e104]:
                - text: "Alten dazu:"
                - emphasis [ref=e105]: „Ich habe mich aus privaten und beruflichen Gründen dazu entschieden, meine Funktion als Sportdirektor niederzulegen. Ich bin dankbar für die Möglichkeit, in dieser Zeit mitgestalten zu dürfen, und wünsche dem Verband für die weitere Entwicklung viel Erfolg.“
              - paragraph [ref=e106]:
                - strong [ref=e107]: Die APU bedankt sich herzlich für sein Engagement und die geleistete Arbeit in einer wichtigen Phase der Weiterentwicklung des österreichischen Padelsports.
              - paragraph [ref=e108]
            - paragraph
