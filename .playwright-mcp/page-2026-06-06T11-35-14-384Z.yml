            - generic [ref=e136]:
              - paragraph [ref=e137]:
                - text: Mit der
                - strong [ref=e138]: Bundesliga 2026
                - text: führen wir eine
                - strong [ref=e139]: neue Struktur für den wichtigsten nationalen Mannschaftsbewerb im Padel
                - text: ein.
              - paragraph [ref=e140]:
                - text: Ziel ist es, den Wettbewerb übersichtlicher zu gestalten, klare Auf- und Abstiegswege zu schaffen und möglichst vielen Teams spannende Matches zu ermöglichen. Die Turniere werden in
                - strong [ref=e141]: Kooperation mit dem Padeldome
                - text: im neuen
                - strong [ref=e142]: The Dome Stadlau
                - text: mit 16 Indoor-Courts veranstaltet und bieten bis zu 124 Teams die Chance an der Bundesliga teilzunehmen!
