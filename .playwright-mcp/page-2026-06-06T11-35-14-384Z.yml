            - generic [ref=e70]:
              - paragraph [ref=e71]
              - paragraph [ref=e72]: Die österreichischen Nachwuchsmeisterschaften im Padel sorgten im The Padel Park in Semriach für spannende Matches, hochklassige Ballwechsel und viele starke Leistungen der heimischen Nachwuchsspieler:innen. In den Altersklassen U14, U16 und U18 kämpften Talente aus mehreren Bundesländern um die österreichischen Meistertitel und zeigten eindrucksvoll die positive Entwicklung des Nachwuchspadels in Österreich.
