          - generic [ref=e154]:
            - paragraph
            - generic [ref=e155]:
              - paragraph [ref=e156]:
                - strong [ref=e157]: Automatischer KO-Raster, Live-Ergebnisse und mehr Transparenz bei der APN – wir haben unsere Plattform weiter verbessert.
              - paragraph [ref=e158]: "Unsere Turnierplattform wird laufend weiterentwickelt, damit Turniere für Veranstalter einfacher zu organisieren sind und für euch noch übersichtlicher werden. Zwei neue Funktionen bringen jetzt wieder spürbare Verbesserungen: ein automatisierter KO-Raster für Turniere sowie eine ausführliche Beschreibung der Austrian Padel Number (APN)."
