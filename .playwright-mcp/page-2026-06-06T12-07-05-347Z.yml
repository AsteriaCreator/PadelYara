        - generic [ref=e279]:
          - heading "Die Padel-Regeln" [level=3] [ref=e282]
          - generic [ref=e291]:
            - paragraph [ref=e292]:
              - text: Die Regeln von Padel ähneln grundlegend denen des Tennis-Doppelspiels. Ein ausführliches Regelwerk hält die Federación Internacional de Pádel auf ihrer Internetseite als
              - link "Download" [ref=e293] [cursor=pointer]:
                - /url: https://docs.wixstatic.com/ugd/b602c3_f2cea9c6d1fe4caea85d35f7ea396eb9.pdf
              - text: (Englisch) bereit.
            - paragraph [ref=e294]: Padel wird in der Regel im Doppel – zwei gegen zwei – gespielt. Die gegeneinander spielenden Teams stehen sich auf den durch das Netz geteilten Spielfeldhälften gegenüber.
            - heading "Der Aufschlag" [level=6] [ref=e295]:
              - strong [ref=e296]: Der Aufschlag
            - paragraph [ref=e297]: Der Aufschlag wird als Unterhandschlag, man sagt auch „von unten“, ausgeführt. D.h., der Treffmoment von Schläger und Ball ist maximal auf Höhe der Hüfte oder darunter. Hierfür steht der Aufschläger mit beiden Füßen hinter der Aufschlaglinie und prellt den Ball hinter der Aufschlaglinie auf den Boden.
            - paragraph [ref=e298]: Beim Treffmoment von Schläger und Ball hat der Aufschläger mit mindestens einem Fuß Bodenkontakt und spielt den Ball diagonal über das Netz in das schräg gegenüberliegende Aufschlagfeld.
            - paragraph [ref=e299]: Berührt der Ball beim Aufschlag das Netz und setzt anschließend im richtigen Aufschlagfeld auf ohne vorher eine Seitenwand oder den Metallzaun zu berühren, wird ein „let“ gegeben und der Aufschlag ist zu wiederholen. Bei fehlerhaftem ersten Aufschlag wird auf derselben Aufschlagseite ein zweiter Aufschlag erlaubt.
            - paragraph [ref=e300]: Der Aufschlag des ersten Punktes wird von der rechten Seite ausgeführt. Anschließend wird der Ball wechselseitig serviert.
            - heading "Punktesystem" [level=6] [ref=e301]:
              - strong [ref=e302]: Punktesystem
            - paragraph [ref=e303]:
              - text: "Ein Punkt gilt als verloren:"
              - text: a) Bei zwei fehlerhaften Aufschlägen.
              - text: b) Wenn der Ball so returniert wird, dass er im gegnerischen Spielfeld zuerst die Rück- oder Seitenwand oder den Metallzaun berührt, bevor er im Spielfeld aufsetzt.
              - text: c) Wenn der Ball ein zweites Mal im eigenen Spielfeld aufsetzt, bevor er returniert werden kann.
              - text: d) Wenn der Ball nach dem Schlagen den Metallzaun des eigenen Spielfeldes berührt. (Die Benutzung der eigenen Rück- oder Seitenwände ist erlaubt, um den Ball über das Netz zu spielen.)
              - text: e) Wenn einer der Spieler, deren Schläger oder etwas, das sie mit sich führen das Netz, dessen Pfosten oder einen Teil des gegnerischen Spielfeldes berührt.
              - text: f) Wenn nach dem Schlag der eigene Mitspieler getroffen wird.
            - paragraph [ref=e304]:
              - text: "Um ein Spiel zu gewinnen, sind mindestens vier Punkte erforderlich. Dazu werden jedoch mindestens zwei Punkte Vorsprung benötigt. Gezählt wird in der Reihenfolge 0, 15, 30, 40, Spiel. Haben beide Teams je drei Punkte erzielt, ist der Spielstand „40-40“ (sprich: „40 beide“ oder „deuce“)."
              - text: Der nächste Punkt wird „Vorteil“ zugunsten des Gewinners des Punktes genannt. Erzielt das Team, welches im „Vorteil“ ist, ebenfalls den Folgepunkt, gewinnt es das Spiel. Verliert es ihn, geht der Spielstand zurück auf „deuce“. So wird weitergespielt, bis ein Team nach „deuce“ zwei Punkte in Folge gewinnen kann.
            - paragraph [ref=e305]: Das Team, das als erstes sechs Spiele gewonnen hat und dabei mindestens zwei Spiele Vorsprung hat, gewinnt den Satz. Im Falle eines Unentschieden bei je fünf gewonnenen Spielen, kann der Satz demnach noch mit 7-5 gewonnen werden. Bei einem Stand von 6-6 wird ein Entscheidungsspiel, der sog. „Tie-break“ ausgespielt.
            - paragraph [ref=e306]: Im „Tie-break“ wird 0, 1, 2, 3 usw. gezählt. Er wird von demjenigen Team gewonnen, das zuerst sieben Punkte erzielt. Auch hierfür sind mindestens zwei Punkte Vorsprung erforderlich. Der entsprechende Satz wird dann 7-6 gewertet.
            - paragraph [ref=e307]: Ein Match wird je nach Turnierform durch zwei oder drei gewonnene Sätze entschieden.
