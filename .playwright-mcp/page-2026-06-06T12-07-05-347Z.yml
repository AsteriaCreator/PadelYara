        - generic [ref=e166]:
          - heading "Was ist Padel und was macht es so attraktiv?" [level=3] [ref=e169]
          - paragraph [ref=e177]: Padel ist die am schnellsten wachsende Racket-Sportart der Welt. In Spanien und Lateinamerika ist es bereits sehr populär. Das Spiel gewinnt neue Unternehmen rund um den Globus. In Spanien alleine spielen 2,5 Millionen Menschen Padel und hat sich über die Jahre zu einer sozialen und sehr angesehenen Sportart entwickelt. Von der spielerischen Seite aus ist Padel ist eine Mischung aus Tennis und Squash und wird nur im Doppel gespielt. Gezählt wird nach den Tennisregeln, wobei die Wände beim Spiel miteinbezogen werden. Der Padelplatz ist etwa die Hälfte eines Tennisplatzes und ist auf allen Seiten (20 x 10 Meter) von Glas- und Gitterwänden umgeben. Wie beim Tennis wird der Platz durch ein Mittelnetz in zwei Spielhälften geteilt. Es wird mit Tennisbällen (Druckbälle) und Padelschlägern (elastische Schlagfläche) gespielt. Die Bälle sind handelsüblichen Tennisbällen sehr ähnlich, das Racket besteht aus einem Kunststoff, ist solide und somit nicht bespannt. Gezählt wird wie beim Tennis, gespielt wird auf zwei gewonnene Sätze. Im Vergleich zum Tennis ist der Aufschlag von unten und die Wände können – ähnlich dem Squash – miteinbezogen werden.
