        - paragraph [ref=e56]
        - paragraph [ref=e57]: Wir sind als Verein seit 20.4.2024 in Kematen an der Krems tätig und haben uns zum Ziel gesetzt, den Trendsport Padel-Tennis auch im ländlichen Raum zu etablieren - und das zu einem fairen Preis!
        - paragraph [ref=e58]: Die Förderung gesunder Bewegung, ein soziales Miteinander und die Abrundung des bestehenden Freizeitangebotes mit Tennis, Beachvolleyball, Skater-Park, Fußball sowie einer Bademöglichkeit entlang der Krems stehen dabei bei uns in Kematen/Krems im Vordergrund.
