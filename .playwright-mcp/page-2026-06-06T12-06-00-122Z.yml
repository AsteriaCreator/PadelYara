        - heading "Wie kann ich Padel in Kematen spielen?" [level=3] [ref=e69]
        - paragraph [ref=e70]
        - paragraph [ref=e71]:
          - text: Lege dir erstmalig einen
          - strong [ref=e72]: Zugang zur Plattform eTENNIS
          - text: "an:"
          - link "https://padelking.tennisplatz.info/registrieren" [ref=e73] [cursor=pointer]:
            - /url: https://padelking.tennisplatz.info/registrieren
        - paragraph [ref=e74]:
          - text: Buche deinen gewünschten Padelcourt auf unserer Plattform unter
          - strong [ref=e75]: Reservierung
          - text: (
          - link "https://padelking.tennisplatz.info/reservierung" [ref=e76] [cursor=pointer]:
            - /url: https://padelking.tennisplatz.info/reservierung
          - text: ) zu den dort angeführten Tarifen und komme vorbei.
        - paragraph [ref=e77]: "Ausrüstung leihen oder mitbringen: Wenn du keine eigene Ausrüstung hast, stellen wir dir gerne Schläger und Bälle zur Verfügung. Leihschläger können einfach bei der Platzreservierung online gegen eine geringe Gebühr hinzugefügt werden. Neue Bälle werden vor Ort im Automaten angeboten."
        - paragraph [ref=e78]: "Schnupperkurse & Trainerstunden: Ideal für Anfänger! Unsere erfahrenen Trainer helfen dir gerne, die Grundlagen zu erlernen und dein Spiel zu verbessern. Am besten meldest du dich direkt per Email oder Anruf kurz bei uns!"
        - paragraph [ref=e79]
        - paragraph [ref=e80]: Wer kann Padel spielen?
        - paragraph [ref=e81]:
          - strong [ref=e82]: "Anfänger:"
          - text: Padel ist leicht zu erlernen – in wenigen Minuten hast du die Grundlagen drauf.
        - paragraph [ref=e83]:
          - strong [ref=e84]: Fortgeschrittene
          - text: ": Verbessere deine Technik und Strategie mit regelmäßigen Trainings und Turnieren."
        - paragraph [ref=e85]:
          - strong [ref=e86]: Kinder & Familien
          - text: ": Ein Spiel für die ganze Familie – Spaß und Bewegung für alle!"
        - paragraph [ref=e87]: Egal, ob du regelmäßig spielen oder Padel einfach mal ausprobieren möchtest – wir haben für jeden die passende Möglichkeit. Entdecke jetzt, wie viel Spaß Padel machen kann, und buche deinen Platz noch heute!
