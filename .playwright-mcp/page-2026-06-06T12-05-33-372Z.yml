          - link "Unser neuer Ballautomat ist da! Weltklasse-Bälle direkt im Clubhaus" [ref=e48] [cursor=pointer]:
            - /url: /news-31260-Unser_neuer_Ballautomat_ist_da__Weltklasse_Baelle_direkt_im_Clubhaus
            - img "Unser neuer Ballautomat ist da! Weltklasse-Bälle direkt im Clubhaus" [ref=e49]
          - generic [ref=e50]:
            - heading "Unser neuer Ballautomat ist da! Weltklasse-Bälle direkt im Clubhaus" [level=2] [ref=e51]:
              - link "Unser neuer Ballautomat ist da! Weltklasse-Bälle direkt im Clubhaus" [ref=e52] [cursor=pointer]:
                - /url: /news-31260-Unser_neuer_Ballautomat_ist_da__Weltklasse_Baelle_direkt_im_Clubhaus
            - paragraph [ref=e53]:
              - strong [ref=e54]: Unser neuer Ballautomat im Clubhaus macht dein Padel-Leben ab sofort noch leichter!
            - paragraph [ref=e55]: Schluss mit müden Bällen ohne Druck und vorbei ist die Zeit, in der du Bälle vorab online reservieren musst. Ab jetzt holst du dir deine 3er-Dose Premium-Bälle bequem direkt vor Ort – für unschlagbare 7 Euro.
            - paragraph [ref=e56]:
              - strong [ref=e57]: "Qualität vom Innovationspionier: Tretorn „Serie+ Padel Control“"
            - paragraph [ref=e58]: Wir überlassen deine Performance nicht dem Zufall. Im Automaten warten die High-End-Bälle von Tretorn auf dich – einer schwedischen Traditionsmarke, die bereits seit 1902 zu den absoluten Pionieren in der Ballentwicklung weltweit gehört.
            - paragraph [ref=e59]: "Das Modell Control bietet dir genau die Eigenschaften, die dein Spiel auf das nächste Level heben:"
            - list [ref=e60]:
              - listitem [ref=e61]: "Maximale Ballkontrolle & Spielgefühl: Ein hoch responsiver, weicher Gummikern sorgt für ein fantastisch kontrolliertes, mittelschnelles Spiel."
              - listitem [ref=e62]: "Duraweave-Filz: Der eigens entwickelte, leichte Filz garantiert eine konstante, gleichmäßige Sprungkraft."
              - listitem [ref=e63]: "Feuchtigkeitsabweisend: Die Bälle saugen sich selbst bei hoher Luftfeuchtigkeit nicht voll, behalten ihr Gewicht und bleiben absolut präzise."
              - listitem [ref=e64]: "Extreme Langlebigkeit: Dank der robusten Gasfüllung spielen sich die Bälle auch nach intensiven Ballwechseln noch wie am ersten Tag."
            - paragraph [ref=e65]: "So einfach funktioniert es für alle:"
            - list [ref=e66]:
              - listitem [ref=e67]: Button drücken
              - listitem [ref=e68]: Karte hinhalten (Kontaktlos zahlen mit Bankomat- / Kreditkarte oder Smartphone (Apple-/Google-Pay)
              - listitem [ref=e69]: Bälle für nur 7 € entnehmen und sofort loslegen!
            - paragraph [ref=e70]: Egal ob als frisches Upgrade für das wöchentliche Stammspieler-Match oder als Rettung, wenn die Ausrüstung zu Hause vergessen wurde – schau einfach kurz im Clubhaus vorbei, zücke deine Karte und genieße das perfekte Match.
            - paragraph [ref=e71]: Wir sehen uns auf dem Court!
            - generic [ref=e72]:
              - generic [ref=e73]:
                - img "User Image" [ref=e74]
                - text: Rene Fanninger
              - text: ", 26. Mai 2026"
