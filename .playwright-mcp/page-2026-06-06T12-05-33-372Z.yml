              - strong [ref=e132]: KEMATEN AN DER KREMS
              - text: ". Am 4. April 2026 war es endlich soweit: Wir konnten erstmals ein nationales Padel-Turnier der Kategorie \"Starter\" auf unserer Anlage in Kematen austragen. Das Event war ein voller Erfolg und markierte einen wichtigen Schritt zur Etablierung des Trendsports in der Region."
