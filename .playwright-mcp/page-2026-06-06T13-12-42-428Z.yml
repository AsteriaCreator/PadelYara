            - heading "Die Trendsportart in Kärnten" [level=2] [ref=e116]
            - generic [ref=e117]:
              - paragraph [ref=e118]: Im Jahr 2021 erweiterten wir unser Sportangebot um drei neue Padel-Plätze. Diese neue Trendsportart hat ihren Ursprung in Lateinamerika und Spanien, mittlerweile boomt sie in ganz Europa. In Österreich gibt es derzeit über 300 Anlagen (Stand 2025), in Kärnten sind es mittlerweile 5 Anlagen. Der TC Bad Eisenkappel, TC Annenheim, das Schlosshotel Seefels, Lakeside Padel in Seeboden und die Sportunion Klagenfurt.
              - paragraph [ref=e119]: Mittlerweile spielen wir unter Sektionsleiter und Teamkapitän Hannes Zienitzer mit einem Team in der 2. und 3. Padel Bundesliga sowie mit 4 Teams (3 x Herren und 1 x Damen) in der steirischen Landesliga.
              - paragraph [ref=e120]:
                - text: Regelmäßig finden
                - link "Padel-Turniere" [ref=e121] [cursor=pointer]:
                  - /url: https://www.padeltennis.at/tournaments
                - text: für alle Spielkategorien und für Firmen statt.
