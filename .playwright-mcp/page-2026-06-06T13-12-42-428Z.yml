          - generic [ref=e145]:
            - heading "Was ist Padel?" [level=2] [ref=e147]
            - generic [ref=e148]:
              - paragraph [ref=e149]: Padel, eine Mischung aus Tennis und Squash und wird nur im Doppel gespielt. Gezählt wird nach den Tennisregeln, wobei die Wände beim Spiel miteinbezogen werden. Der Padelplatz ist etwa die Hälfte eines Tennisplatzes (20×10) und ist auf allen Seiten von Glas- und Gitterwänden umgeben.
              - paragraph [ref=e150]: Wie beim Tennis wird der Platz durch ein Mittelnetz in zwei Spielhälften geteilt. Es wird mit eigenen Bällen (Druckbälle) und Padelschlägern (elastische Schlagfläche mit Löchern) gespielt. Der Boden besteht aus einem Quarzsandteppich.
              - paragraph [ref=e151]: Padel wird zu viert (2 gegen2) gespielt, es ist einfach zu erlernen und überzeugt durch seinen sehr hohen Spaß-Faktor. Es ist für jedermann in jedem Alter.
        - generic [ref=e153]:
