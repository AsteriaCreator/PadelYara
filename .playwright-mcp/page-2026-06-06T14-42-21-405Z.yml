      - heading "Vorteile von Padel" [level=2] [ref=e48]
      - paragraph [ref=e49]: Padel ist eine der am schnellsten wachsenden Sportarten der Welt. Nach Angaben des Internationalen Padel-Verbandes (FIP) wird Padel heute von rund 25 Millionen Menschen auf der ganzen Welt aktiv ausgeübt. Die Gründe für die Beliebtheit des Sports sind vielfältig.
      - generic [ref=e50]:
        - generic [ref=e51]:
          - img "Stern" [ref=e52]
          - heading "Einfacher Zugang" [level=3] [ref=e53]
          - paragraph [ref=e54]: Padel ist schnell zugänglich und hat eine flachere Lernkurve als andere Rückschlagsportarten
        - generic [ref=e55]:
          - img "Stern" [ref=e56]
          - heading "Hoher Spaßfaktor" [level=3] [ref=e57]
          - paragraph [ref=e58]: Padel ist sehr dynamisch und abwechslungsreich. Lange Ballwechsel und viele Ballkontakte stehen im Vordergrund.
        - generic [ref=e59]:
