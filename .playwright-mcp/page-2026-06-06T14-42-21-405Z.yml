      - heading "Wir fördern den Padel Sport in Kärnten" [level=1] [ref=e25]
    - generic [ref=e27]:
      - heading "Gemeinsam für den Padelsport in Kärnten" [level=2] [ref=e28]
      - generic [ref=e29]:
        - generic [ref=e30]:
          - paragraph [ref=e31]: Der Kärntner Padel Verband (KPV) hat es sich zur Aufgabe gemacht, den Padelsport in Kärnten zu fördern und nachhaltig zu entwickeln. Padel ist mehr als nur Sport – es verbindet Menschen, fördert Teamgeist und bereichert das Leben durch Bewegung und Freude am Spiel. Unser Verband steht hinter der Vision, Padel als Sport für alle Altersgruppen und Leistungsstufen in unserer Region zu etablieren und für die Zukunft zu sichern.
          - paragraph [ref=e32]: Unsere Mission ist es, Padel für alle Alters- und Leistungsklassen zu etablieren und eine starke Gemeinschaft rund um den Sport zu schaffen. Dabei setzen wir auf Fairness, Respekt und Offenheit, um eine inklusive Sportkultur zu fördern. Ob in der Freizeit oder im Wettkampf - der Kärntner Padel Verband unterstützt alle, die sich für diesen Sport begeistern und steht für ein Miteinander, in dem jeder willkommen ist.
        - generic [ref=e33]:
          - paragraph [ref=e34]: Der KPV setzt sich aktiv für den Ausbau der Infrastruktur, die Organisation von Turnieren und Events sowie die Ausbildung von Padel-Coaches ein. Damit legen wir den Grundstein dafür, dass Padel in Kärnten wächst und sich als Breitensport etabliert - für mehr Bewegung, Spaß und Zusammenhalt auf und neben dem Platz!
          - img "Markus Pirker-Rodrix" [ref=e35]
