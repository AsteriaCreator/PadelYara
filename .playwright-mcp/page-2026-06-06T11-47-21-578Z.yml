              - paragraph [ref=e45]: Seit Anfang des Jahres finden regelmäßig Events, organisiert durch die Team Krenn-Alten Academy, in der Padelhalle Gänserndorf statt. Aufgrund des großen Erfolges versuchen wir die Regelmäßigkeit zumindest bis Ende Juni fortzusetzen. Und das Beste dabei ist, wir sind NICHT wetterabhängig. Bei ausreichend Teilnehmern finden die Events somit fix statt.
