            - link "Padeljahr 2026 erfolgreich eröffnet!" [ref=e66] [cursor=pointer]:
              - /url: /news-28729-Padeljahr_2026_erfolgreich_eroeffnet_
              - img "Padeljahr 2026 erfolgreich eröffnet!" [ref=e67]
            - generic [ref=e68]:
              - heading "Padeljahr 2026 erfolgreich eröffnet!" [level=2] [ref=e69]:
                - link "Padeljahr 2026 erfolgreich eröffnet!" [ref=e70] [cursor=pointer]:
                  - /url: /news-28729-Padeljahr_2026_erfolgreich_eroeffnet_
              - paragraph [ref=e71]: Die Playpadelhalle in Gänserndorf ist ambitioniert mit einer Eventreihe von 10 Events in 10 Tagen in das Jahr 2026 gestartet. Die Turniere (vom Starter bis Professional), die Workshops (für Starter und Damen) oder das Come Together zählten alle gemeinsam über 200 Teilnehmer/innen. Zusätzlich lockte die Exhibition von Kabarettist Klaus Eckel, Ex-Tennisprofi Jürgen Melzer mit den Padelpionieren Christoph Krenn und David Alten zahlreiche Zuseher in die Halle. Zum Abschluss des Tages matchten sich die besten Spieler der Ukraine und Österreich in einem sehr hochklassiken Doppel. Auch am Sonntag gab es noch die Möglichkeit mit Bürgermeister Rene Lobner zu padeln.
