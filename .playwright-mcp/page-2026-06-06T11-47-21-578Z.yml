              - paragraph [ref=e58]: Neben zahlreichen Aktivitäten mit Turniere, Come Togehter oder Turnieren für Beginner, Starter, Advanced und Expert wird in den kommenden Wochen auch Österreich Elite mehrmals zu Gast in der Playpadel Gänserndorf Halle sein.
