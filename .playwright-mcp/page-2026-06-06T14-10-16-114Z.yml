        - generic [ref=e142]:
          - heading "Wie wird Padel gespielt?" [level=3] [ref=e144]
          - generic [ref=e146]:
            - paragraph [ref=e147]: Grundsätzlich ist die Zählweise wie im Tennis (15-30-40). Man spielt also auf sechs gewonnene Games und auf zwei Gewinnsätze.
            - paragraph [ref=e148]: Auch die Position beim Aufschlag hinter der T-Linie ist mit dem Tennis vergleichbar. Allerdings ist der Service von unten durchzuführen und der Schläger darf dabei nicht oberhalb der Hüfte geführt werden. Beim Aufschlag ist es nicht erlaubt den Ball Volley zurückzuspielen. Zudem darf beim Service der Ball nicht vom Boden auf das an der Seite befindende Gitter gelangen.
            - paragraph [ref=e149]: Während des Ballwechsels ist es nur dann erlaubt den Ball direkt an die Glaswand zu befördern, wenn er vom eigenen Feld aus, gespielt wird. Wird der Ball vom eigenen Feld aus, direkt auf die Glaswand oder das Gitter der gegnerischen Seite gespielt ist es ein Fehler.
