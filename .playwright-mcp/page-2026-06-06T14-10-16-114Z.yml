        - heading "Unsere Preise" [level=2] [ref=e209]
        - generic [ref=e211]:
          - paragraph [ref=e212]: Wir wollen eine Möglichkeit bieten, dass Interessierte und sportbegeisterte Menschen in unserer Umgebung die Faszination Padel-Tennis kennenlernen können. Hat man nämlich einmal einen packenden Ballwechsel gespielt, will man dieses Gefühl immer wieder erleben. Es gibt mehrere Möglichkeiten dies zu tun.
          - paragraph [ref=e213]:
            - text: Stundentickets können direkt über unsere
            - link "Platz-Buchungs-Plattform" [ref=e214] [cursor=pointer]:
              - /url: https://ptc.tennisplatz.info/reservierung
            - text: gebucht werden. Dabei erhält man einen vierstelligen Code, mit dem sich das Zugangstor unserer Anlage öffnen lässt!
          - paragraph [ref=e215]: Kennen Sie bereits unsere Gutscheine? Die Gutscheine eignen sich als perfekte Geschenke für Geburtstage, Ostern oder für ein kleines Präsent an Ihre Mitarbeiter.
