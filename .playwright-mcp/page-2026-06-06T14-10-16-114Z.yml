      - generic [ref=e64]:
        - generic [ref=e65]:
          - paragraph [ref=e67]: 1. Padel Tennis Club Vorarlberg (1. PTCV)
          - heading "Padel-Tennis Platz in Rankweil / Vorarlberg" [level=1] [ref=e68]
        - generic [ref=e70]:
          - paragraph [ref=e71]: Das vorrangige Ziel des 1. Padel Tennis Club Vorarlberg ist die Verbreitung und Förderung des Padel-Tennissports. Wir wollen aktiv Teil der am schnellsten wachsenden Sportart weltweit sein! Unser Projekt legt den Fokus auf Mobilität und Nachhaltigkeit. Eine Wiederverwertung des ursprünglichen Lagerplatzes, so wie wir ihn vorgefunden haben, ist Teil der Idee.
          - paragraph [ref=e72]:
            - strong [ref=e73]: "Wo:"
            - text: Rankweil,
            - link "Zieglerweg 17" [ref=e74] [cursor=pointer]:
              - /url: "#kontakt"
            - strong [ref=e75]: "Wann:"
            - text: Montag – Sonntag von 08:00 – 21:30 Uhr
          - paragraph [ref=e76]: "****************************************"
          - paragraph [ref=e77]: Der Court 1 ist bei jeder Witterung bespielbar!
          - paragraph [ref=e78]: Der Court 2 ist ein Freiplatz!
          - paragraph [ref=e79]: Bei Zahlung vor Ort bitte den genauen Betrag zum Einwerfen mitnehmen.
          - paragraph [ref=e80]: Sie können aber auch gerne den zu bezahlenden Betrag direkt per Apple pay bezahlen.
          - paragraph [ref=e81]: von 8-16 Uhr 20,00 € pro Platz/Stunde und von 16-21:30 Uhr 40,00 € pro Platz/Stunde
          - paragraph [ref=e82]: Preis Padel – Racket 3,00 € pro Schläger
          - paragraph [ref=e83]: Eine Stornierung deiner Buchung ist bis 36 Stunden vor Beginn kostenlos möglich. Bei späterer Absage oder Nichterscheinen wird der volle Betrag verrechnet.
          - paragraph [ref=e84]: Vielen Dank!
