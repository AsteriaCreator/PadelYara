          - heading "Partner-Pakete" [level=3] [ref=e715]
          - paragraph [ref=e716]: "Unsere flexiblen Partner-Pakete liefern genau das Spielkontingent, das Ihr Unternehmen braucht: Sie erhalten ein Bündel individueller Buchungscodes, die sich unkompliziert an Mitarbeitende oder Kund:innen weitergeben lassen. Optional ergänzen wir Ihr Paket um sichtbares Sponsoring vor Ort und gemeinsame Social-Media-Features."
